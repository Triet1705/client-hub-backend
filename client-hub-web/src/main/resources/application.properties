# Application Name
spring.application.name=client-hub-backend

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:clienthub}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=OTHER
spring.jpa.open-in-view=false

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.clienthub=DEBUG
logging.level.org.hibernate.SQL=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
# 15 minutes in milliseconds
jwt.refresh-expiration=86400000
# 24 hours in milliseconds
app.jwt.refresh-expiration-ms=604800000
app.auth.refresh-cookie-name=refresh_token
app.auth.refresh-cookie-secure=false
app.auth.refresh-cookie-same-site=Lax

# MinIO Configuration
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=${MINIO_BUCKET_NAME:client-hub-files}

# Ollama AI Configuration
ai.ollama.url=${OLLAMA_URL:http://localhost:11434}
ai.ollama.model=${OLLAMA_MODEL:llama3.2:3b}
ai.ollama.connect-timeout=5
ai.ollama.read-timeout=120

# AI Extraction Pipeline
ai.extraction.max-retries=2
ai.extraction.confidence-threshold=0.65
ai.extraction.max-document-chars=15000

# Redis Cache Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis_password}
spring.data.redis.timeout=2000ms
spring.cache.type=redis

# Rate Limiting Configuration
rate-limit.login=5
rate-limit.register=3
rate-limit.ai=10
rate-limit.general=60

logging.file.name=D:/client-hub-project/client-hub-backend/app.log

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# Task 4.1: Move uploads out of web root
file.upload-dir=/var/clienthub/uploads

# Server Limits
server.max-http-request-header-size=16KB

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Blockchain Configuration
blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
blockchain.node_url=${BLOCKCHAIN_NODE_URL:http://localhost:8545}
blockchain.admin_private_key=${ADMIN_WALLET_KEY:}
blockchain.contract_address=${ESCROW_CONTRACT_ADDRESS:}

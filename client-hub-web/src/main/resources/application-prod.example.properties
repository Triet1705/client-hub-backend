# Production profile template.
# Copy to application-prod.properties in the deployment environment or provide equivalent env vars.

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

logging.level.root=INFO
logging.level.com.clienthub=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=${LOG_FILE:/var/log/clienthub/application.log}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

minio.url=${MINIO_URL}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET_NAME}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}

app.tenant.require-header=true
app.rls.enabled=true
app.auth.refresh-cookie-secure=true
app.auth.refresh-cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
blockchain.node_url=${BLOCKCHAIN_NODE_URL:}
blockchain.admin_private_key=${ADMIN_WALLET_KEY:}
blockchain.contract_address=${ESCROW_CONTRACT_ADDRESS:}
